<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
   
       <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">


<title>AI Content Hub</title>
    <style>
    :root { 
        --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
        --text: #f1f5f9; --input-bg: #0f172a; 
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 500px; width: 100%; }
    .card { background: var(--card); padding: 24px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); margin-bottom: 20px; }
    h2 { margin: 0 0 20px 0; text-align: center; font-weight: 700; color: #fff; }
    label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
    
    input, select { 
        width: 100%; padding: 18px; margin-bottom: 20px; 
        border-radius: 16px; border: 2px solid #334155; 
        background: var(--input-bg); color: #fff; font-size: 16px; 
        box-sizing: border-box; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); outline: none; }
    
    .preview { background: #000; padding: 18px; border-radius: 16px; font-size: 15px; color: #cbd5e1; border: 1px solid #334155; white-space: pre-wrap; line-height: 1.5; margin-bottom: 20px; }
    
    /* Buttons */
    .btn-share { 
        display: block; width: 100%; padding: 18px; border-radius: 16px; 
        background: var(--accent); color: white; font-weight: 600; text-align: center; 
        text-decoration: none; font-size: 16px; box-sizing: border-box;
    }
    .btn-add { background: #10b981; border: none; color: white; padding: 16px; width: 100%; border-radius: 16px; font-weight: 600; cursor: pointer; margin-top: 5px; }
    
    /* Favoriten */
    summary { cursor: pointer; font-weight: 600; padding: 14px; color: #fff; background: #334155; border-radius: 12px; text-align: center; }
    .link-item { display: flex; background: #0f172a; padding: 14px; border-radius: 12px; margin-top: 10px; align-items: center; font-size: 1rem; }
    .del-btn { color: #f87171; padding: 0 10px; font-weight: bold; cursor: pointer; }
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h2>AI Content Hub</h2>
        <label>URL der Seite:</label>
        <input type="url" id="url" placeholder="https://..." oninput="update()" onclick="this.select()">
        
        <label>Modus wählen:</label>
        <select id="role" onchange="update()">
            <optgroup label="Analyse & Fakten">
                <option value="Analyst">🔍 Präzisions-Analyst</option>
                <option value="FactChecker">⚖️ Fact-Checker</option>
                <option value="TitleCheck">🎯 Titel-Check (Passend zur Überschrift?)</option>
            </optgroup>




            <optgroup label="Briefing & Journalismus">
                <option value="Journalist">📰 Redaktions-Chef</option>
                <option value="Briefing">⚡ Executive Briefing</option>
            </optgroup>

<option value="EinfachErklaert"> EinfachErklaert</option>
            </optgroup>





            <optgroup label="Multimedia & Deep Dive">
                <option value="VideoSummary">🎬 Video-Zusammenfasser</option>
                <option value="NetCheck">🌐 Internet-Abgleich & Kontext</option>
            </optgroup>
        </select>

        <div class="preview" id="preview"></div>
        <button class="btn-share" onclick="share()">📱 Teilen an AI</button>
    </div>

    <div class="card">
        <h3>Favoriten</h3>
        <input type="text" id="newName" placeholder="Name">
        <input type="url" id="newUrl" placeholder="https://...">
        <button class="btn-add" onclick="addLink()">+ Favorit hinzufügen</button>
        <div class="quick-links" id="quickLinksContainer"></div>
    </div>
</div>

<script>
let links = JSON.parse(localStorage.getItem('myLinks')) || [{ name: "DLF Presseschau", url: "https://www.deutschlandfunk.de/presseschauen-100.html" }];

const roles = {
    "Analyst": "Du bist ein präziser Analyst. Nutze AUSSCHLIESSLICH den Inhalt des folgenden Links. Liste die 5 wichtigsten Fakten auf. Link: ",
    "FactChecker": "Du bist ein Fact-Checker. Prüfe die Aussagen NUR anhand des Textes. Wenn eine Behauptung nicht belegt ist, markiere sie. Link: ",
    "TitleCheck": "Analysiere die Überschrift des Artikels unter diesem Link. Passt sie zum Inhalt? Ist sie Clickbait oder irreführend? Wenn sie nicht passt, schlage eine präzisere und neutralere Überschrift vor. Link: ",
    "Journalist": "Du bist ein objektiver Redakteur. Fasse den Text strukturiert zusammen. Link: ",
    "Briefing": "Erstelle ein 'Executive Briefing'. Nutze ausschließlich den Text. Max. 3 Sätze. Link: ",
    "VideoSummary": "Fasse das Video unter diesem Link zusammen, inkl. wichtiger Zeitmarken. Nutze nur den Inhalt. Link: ",
    "NetCheck": "Analysiere den Inhalt des Links und gleiche die Aussagen mit aktuellen Informationen aus dem Internet ab. Was ist neu? Was ist strittig? Welche Perspektiven fehlen? Link: ",
// ... füge diesen Eintrag zu deinem 'roles' Objekt hinzu:
"EinfachErklaert": "Du bist ein Experte darin, komplexe Themen einfach zu erklären. Fasse den Inhalt des folgenden Links in einfacher Sprache zusammen, so dass es jeder sofort versteht. Nutze AUSSCHLIESSLICH den Text der Seite. Link: ",

};

function renderLinks() {
    const container = document.getElementById('quickLinksContainer');
    container.innerHTML = "";
    links.forEach((link, index) => {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerHTML = `<div class="link-name" onclick="setLink('${link.url}')">${link.name}</div>
                         <div class="link-open" onclick="window.open('${link.url}', '_blank')">↗</div>
                         <div class="del-btn" onclick="removeLink(${index})">✕</div>`;
        container.appendChild(div);
    });
    localStorage.setItem('myLinks', JSON.stringify(links));
}

function setLink(url) { document.getElementById('url').value = url; update(); }
function addLink() {
    const name = document.getElementById('newName').value;
    const url = document.getElementById('newUrl').value;
    if(name && url) { links.push({name, url}); renderLinks(); }
}
function removeLink(index) { links.splice(index, 1); renderLinks(); }
function update() {
    const url = document.getElementById('url').value;
    const role = document.getElementById('role').value;
    document.getElementById('preview').innerText = roles[role] + (url || "https://www.merriam-webster.com/dictionary/hier-");
}
async function share() {
    const text = document.getElementById('preview').innerText;
    if (navigator.share) await navigator.share({text: text});
}

Object.keys(roles).forEach(r => {
    let opt = document.createElement('option');
    opt.value = r; opt.innerHTML = r;
    document.getElementById('role').appendChild(opt);
});

renderLinks();
update();
</script>
</body>
</html>
