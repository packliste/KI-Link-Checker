<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>AI Content Hub</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --text: #f1f5f9; --input-bg: #0f172a; 
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 24px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h2 { margin: 0 0 20px 0; text-align: center; font-weight: 700; color: #fff; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        
        input, select { 
            width: 100%; padding: 18px; margin-bottom: 20px; 
            border-radius: 16px; border: 2px solid #334155; 
            background: var(--input-bg); color: #fff; font-size: 16px; 
            box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; }
        
        .preview { background: #000; padding: 18px; border-radius: 16px; font-size: 15px; color: #cbd5e1; border: 1px solid #334155; white-space: pre-wrap; line-height: 1.5; margin-bottom: 20px; }
        
        button { padding: 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; color: white; width: 100%; font-size: 16px; transition: opacity 0.2s; }
        .btn-share { background: var(--accent); }
        .btn-add { background: #10b981; margin-top: 5px; }
        
        summary { cursor: pointer; font-weight: 600; padding: 14px; color: #fff; background: #334155; border-radius: 12px; text-align: center; }
        .link-item { display: flex; background: #0f172a; padding: 14px; border-radius: 12px; margin-top: 10px; align-items: center; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Content Hub</h2>
        <label>URL der Nachrichtenseite:</label>
        <input type="url" id="url" placeholder="https://..." onclick="this.select()" oninput="update()">
        
        <label>Analyse-Modus:</label>
        <select id="role" onchange="update()">
            <option value="Analyst">🔍 Analyst: Kernfakten</option>
            <option value="FactChecker">⚖️ Fact-Checker</option>
            <option value="TitleCheck">🎯 Titel-Check (Clickbait?)</option>
            <option value="Journalist">📰 Redaktions-Chef</option>
            <option value="Briefing">⚡ Executive Briefing</option>
            <option value="VideoSummary">🎬 Video-Zusammenfassung</option>
            <option value="NetCheck">🌐 Internet-Abgleich</option>
        </select>

        <div class="preview" id="preview"></div>
        <button class="btn-share" onclick="share()">Teilen an AI</button>
    </div>

    <div class="card">
        <details>
            <summary>Favoriten verwalten</summary>
            <input type="text" id="newName" placeholder="Name (z.B. Spiegel)">
            <input type="url" id="newUrl" placeholder="https://...">
            <button class="btn-add" onclick="addLink()">Favorit speichern</button>
            <div id="quickLinksContainer"></div>
        </details>
    </div>
</div>

<script>
let links = JSON.parse(localStorage.getItem('myLinks')) || [{ name: "DLF Presseschau", url: "https://www.deutschlandfunk.de/presseschauen-100.html" }];
const roles = {
    "Analyst": "Du bist ein präziser Analyst. Nutze NUR den Inhalt des folgenden Links. Liste 5 Fakten auf. Link: ",
    "FactChecker": "Prüfe die Aussagen des Textes auf Logik. Markiere unbelegte Behauptungen. Link: ",
    "TitleCheck": "Passt die Überschrift zum Inhalt? Ist sie Clickbait? Schlage eine neutrale vor. Link: ",
    "Journalist": "Fasse den Text objektiv und strukturiert zusammen. Link: ",
    "Briefing": "Executive Briefing: Komme in max 3 Sätzen zum Punkt. Link: ",
    "VideoSummary": "Fasse das Video zusammen (mit Zeitmarken, falls möglich). Link: ",
    "NetCheck": "Gleiche den Inhalt mit aktuellen Web-Infos ab. Was ist neu/strittig? Link: "
};

function renderLinks() {
    const container = document.getElementById('quickLinksContainer');
    container.innerHTML = "";
    links.forEach((link, index) => {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerHTML = `<div style="flex-grow:1; cursor:pointer;" onclick="setLink('${link.url}')">${link.name}</div>
                         <div style="padding:0 10px;" onclick="window.open('${link.url}', '_blank')">↗</div>
                         <div style="color:#f87171; padding:0 10px; font-weight:bold;" onclick="removeLink(${index})">✕</div>`;
        container.appendChild(div);
    });
    localStorage.setItem('myLinks', JSON.stringify(links));
}

function setLink(url) { document.getElementById('url').value = url; update(); }
